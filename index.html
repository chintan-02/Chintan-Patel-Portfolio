<!doctype html>
<html lang="en">
  <head>
    <!-- runs before first paint: applies a stored light-theme preference immediately
         so returning light-mode visitors never see a dark flash. Dark is the CSS
         default (no attribute needed), so there's nothing to do for dark/first-time
         visitors — this only ever needs to ADD the light attribute, never remove it. -->
    <script>
      (function () {
        try {
          if (localStorage.getItem('theme') === 'light') {
            document.documentElement.setAttribute('data-theme', 'light');
            document.addEventListener('DOMContentLoaded', function () {
              var meta = document.querySelector('meta[name="theme-color"]');
              if (meta) meta.setAttribute('content', '#F6F1E9');
            });
          }
        } catch (e) {}
      })();
    </script>
    <meta charset="UTF-8" />
