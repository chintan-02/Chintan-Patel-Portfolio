<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="32" y2="32" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0d9488"/>
      <stop offset="100%" stop-color="#0ea5e9"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background — gradient teal to sky blue -->
  <rect width="32" height="32" rx="7" fill="url(#g)"/>
  <!-- C arc — bold neural connection mark -->
  <path d="M23 8 C23 5.5 7 5.5 7 16 C7 26.5 23 26.5 23 24"
        stroke="white" stroke-width="5" fill="none" stroke-linecap="round"/>
  <!-- Neural terminal nodes — two activation points -->
  <circle cx="23" cy="8"  r="3.5" fill="white"/>
  <circle cx="23" cy="24" r="3.5" fill="white"/>
</svg>
